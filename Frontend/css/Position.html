<!DOCTYPE html>
<html>

<head>

<title>CSS Position Example</title>

<style>

.box{
width:150px;
height:100px;
background-color:lightblue;
margin:20px;
border:2px solid black;
}

.relative{
position:relative;
left:30px;
}

.absolute{
position:absolute;
top:50px;
left:200px;
background-color:yellow;
}

.fixed{
position:fixed;
bottom:10px;
right:10px;
background-color:red;
}

.sticky{
position:sticky;
top:0;
background-color:green;
}

</style>

</head>

<body>
    <h1>HI THIS IS MY PAGE</h1>
    <p>'
        {'              '
        '              ''
        '               ''
        '
        '
        ''' ' ' ' ' '''
        '
        
        ''
        '}<br>
    </p>


<div class="box">Static Box</div>

<div class="box relative">Relative Box</div>
<h2 class="sticky">Sticky Header</h2>

<div class="box absolute">Absolute Box</div>

<div class="box fixed">Fixed Box</div>

</body>

</html>
