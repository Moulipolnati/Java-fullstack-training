<!DOCTYPE html>
<html>

<head>
<title>CSS nth-child Example</title>

<style>

/* odd list items */
ul li:nth-child(odd){
    color: red;
}

/* even list items */
ul li:nth-child(even){
    color: blue;
}

</style>

</head>

<body>

<h2>CSS nth-child Example</h2>

<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
<li>Java</li>
<li>Spring Boot</li>
<li>SQL</li>
</ul>

</body>

</html>
