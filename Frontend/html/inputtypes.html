<!DOCTYPE html>
<html>

<head>
<title>Input Types</title>
</head>

<body>

<h2>Input Types Example</h2>

<form>

Name: <input type="text"><br><br>

Password: <input type="password"><br><br>

Email: <input type="email"><br><br>

Website: <input type="url"><br><br>

Number: <input type="number" min="1" max="100"><br><br>

Range: <input type="range" min="0" max="100"><br><br>

Date: <input type="date"><br><br>

Time: <input type="time"><br><br>

Color: <input type="color"><br><br>

Phone: <input type="tel" pattern="[0-9]{10}"><br><br>

Upload File: <input type="file" multiple><br><br>

<input type="submit">
<input type="reset">

</form>

</body>
</html>
