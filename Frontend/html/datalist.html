<!DOCTYPE html>
<html>

<head>
<title>Datalist Example</title>
</head>

<body>

<!-- Course selection example -->

<h2>Select Course</h2>

<input list="courses" placeholder="Search course">

<datalist id="courses">

<option value="Java">
<option value="Python">
<option value="Fullstack">
<option value="React">
<option value="Spring Boot">

</datalist>

</body>

</html>
