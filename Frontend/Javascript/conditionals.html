<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Conditional Statements</title>
</head>

<body>

<h2>JavaScript Conditional Example</h2>

<script>

    // Example of IF ELSE statement

    let number = 10;

    // Check if number is even or odd
    if(number % 2 === 0){
        console.log("Even Number");
    }
    else{
        console.log("Odd Number");
    }

</script>

</body>
</html>
