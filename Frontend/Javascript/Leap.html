<!DOCTYPE html>
<html>
<head>
<title>Leap Year Example</title>
</head>

<body>

<script>

// Take a year value
let year = 2024;

// First condition
if(year % 4 === 0){

    // Second condition
    if(year % 100 === 0){

        // Third condition
        if(year % 400 === 0){
            console.log(year + " is a Leap Year");
        }
        else{
            console.log(year + " is NOT a Leap Year");
        }

    }
    else{
        console.log(year + " is a Leap Year");
    }

}
else{
    console.log(year + " is NOT a Leap Year");
}

</script>

</body>
</html>
