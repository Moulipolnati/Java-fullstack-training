<!DOCTYPE html>
<html>

<head>
<title>JavaScript Functions</title>
</head>

<body>

<h2>JavaScript Function Example</h2>

<button onclick="showMessage()">Click Me</button>

<script>

    // variable declaration
    let name = "Mouli";

    // function declaration
    function showMessage(){

        // using variable inside function
        alert("Hello " + name);

    }

</script>

</body>

</html>
