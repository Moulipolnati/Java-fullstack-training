<!DOCTYPE html>
<html>

<head>
<title>JavaScript Button Example</title>
</head>

<body>

<!-- Heading displayed on the webpage -->
<h2>JavaScript Example</h2>

<!-- Button that calls a JavaScript function when clicked -->
<button onclick="showMessage()">Click Me</button>

<script>

    // Function that runs when the button is clicked
    function showMessage(){

        // alert() shows a popup message in the browser
        alert("Hello! This is JavaScript.");

        // console.log() prints a message in the browser console (F12)
        console.log("Button was clicked");

    }

</script>

</body>
</html>
